<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orange Editor</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body, #root {
        height: 100%;
      }
      body {
        font-family: Inter, "PingFang SC", "Microsoft YaHei", system-ui, -apple-system, sans-serif;
        color: var(--theme-text-primary);
        background: var(--theme-gradient-page);
        overflow: hidden;
      }

      /* 主题系统CSS变量 - 默认值，会被JS动态覆盖 */
      :root {
        --theme-primary: #f48c45;
        --theme-primary-hover: #fb9b5a;
        --theme-primary-active: #e6732d;
        --theme-primary-light: rgba(244, 140, 69, 0.2);
        --theme-primary-light-bg: rgba(244, 140, 69, 0.1);
        --theme-primary-text: #f48c45;
        --theme-text-secondary: #667085;
        --theme-text-primary: #101828;
        --theme-text-disabled: #98a2b3;
        --theme-background: #f5f7fb;
        --theme-background-card: #ffffff;
        --theme-background-hover: rgba(255,255,255,0.88);
        --theme-surface-base: rgba(255,255,255,0.72);
        --theme-surface-panel: rgba(255,255,255,0.78);
        --theme-surface-panel-solid: rgba(255,255,255,0.94);
        --theme-surface-glass: rgba(255,255,255,0.62);
        --theme-surface-overlay: rgba(255,255,255,0.84);
        --theme-surface-accent: rgba(244, 140, 69, 0.1);
        --theme-border: rgba(148,163,184,0.18);
        --theme-divider: rgba(148,163,184,0.16);
        --theme-border-soft: rgba(255,255,255,0.55);
        --theme-border-strong: rgba(148,163,184,0.26);
        --theme-border-glow: rgba(244, 140, 69, 0.2);
        --theme-shadow-sm: 0 10px 30px rgba(15, 23, 42, 0.06);
        --theme-shadow-md: 0 18px 48px rgba(30, 41, 59, 0.10);
        --theme-shadow-lg: 0 28px 80px rgba(51, 65, 85, 0.15);
        --theme-gradient-page: radial-gradient(circle at top left, rgba(255, 187, 153, 0.72), transparent 32%), radial-gradient(circle at top right, rgba(255, 226, 178, 0.55), transparent 24%), linear-gradient(180deg, #fff9f3 0%, #f6f7ff 52%, #f7fbff 100%);
        --theme-gradient-panel: linear-gradient(135deg, rgba(255,255,255,0.86) 0%, rgba(255,247,240,0.78) 100%);
        --theme-gradient-accent: linear-gradient(135deg, #ffb380 0%, #ff7d6b 48%, #ff6ca8 100%);
        --theme-grid-line: rgba(255,255,255,0.8);
        --theme-ruler-bg: rgba(255,255,255,0.70);
        --theme-scrollbar-thumb: rgba(148,163,184,0.34);
        --theme-backdrop-blur: 18px;
        --theme-success: #22c55e;
        --theme-warning: #f59e0b;
        --theme-error: #ef4444;
        --theme-info: #f48c45;
        --semi-color-primary: #f48c45;
        --semi-color-primary-hover: #fb9b5a;
        --semi-color-primary-active: #e6732d;
        --semi-color-primary-light: rgba(244, 140, 69, 0.2);
        --semi-color-link: #f48c45;
        --semi-color-link-hover: #fb9b5a;
        --semi-color-info: #f48c45;
      }

      * {
        scrollbar-width: thin;
        scrollbar-color: var(--theme-scrollbar-thumb) transparent;
      }
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--theme-scrollbar-thumb);
        border-radius: 999px;
        border: 2px solid transparent;
        background-clip: padding-box;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }

      /* 强制覆盖 Tabs 选中态 */
      .semi-tabs-tab.semi-tabs-tab-active {
        color: var(--theme-primary) !important;
        border-left-color: var(--theme-primary) !important;
        background-color: var(--theme-surface-accent) !important;
        box-shadow: inset 0 0 0 1px var(--theme-border-glow);
      }
      .semi-tabs-tab.semi-tabs-tab-active::before {
        background-color: var(--theme-primary) !important;
      }

      /* 强制覆盖 Tabs hover 背景 */
      .semi-tabs-tab:hover {
        background-color: rgba(255,255,255,0.62) !important;
      }

      /* 强制覆盖 Button primary */
      .semi-button-primary {
        background: var(--theme-gradient-accent) !important;
        border-color: transparent !important;
        color: #fff !important;
        box-shadow: var(--theme-shadow-sm) !important;
      }
      .semi-button-primary:hover {
        filter: brightness(1.02);
      }

      /* 强制覆盖 Button secondary */
      .semi-button-secondary {
        color: var(--theme-primary) !important;
        border-color: var(--theme-border-glow) !important;
        background: rgba(255,255,255,0.72) !important;
        backdrop-filter: blur(var(--theme-backdrop-blur));
      }

      /* 强制覆盖 Input focus */
      .semi-input-wrapper-focus {
        border-color: var(--theme-primary) !important;
        box-shadow: 0 0 0 4px var(--theme-primary-light) !important;
      }

      .semi-input-wrapper,
      .semi-select,
      .semi-tabs-bar,
      .semi-tabs-content,
      .semi-select-selection,
      .semi-input,
      .semi-input-textarea {
        border-radius: 16px;
      }

      /* 拖拽放置目标高亮 */
      [data-drop-target="true"] {
        outline: 2px dashed var(--theme-primary) !important;
        outline-offset: -2px;
        background-color: var(--theme-surface-accent) !important;
        box-shadow: 0 0 0 6px var(--theme-primary-light) !important;
        transition: outline 0.15s, background-color 0.15s, box-shadow 0.15s;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
