syntax = "proto3";

package user;

service UserService {
  rpc SendEmailCode (SendEmailCodeRequest) returns (SendEmailCodeResponse);
  rpc RegisterEmail (RegisterEmailRequest) returns (RegisterResponse);
  rpc LoginEmail (LoginEmailRequest) returns (LoginResponse);
  rpc LoginEmailCode (LoginEmailCodeRequest) returns (LoginResponse);
  rpc ResetPassword (ResetPasswordRequest) returns (ResetPasswordResponse);
  rpc RefreshToken (RefreshTokenRequest) returns (RefreshTokenResponse);
  rpc GetUser (GetUserRequest) returns (UserInfo);
  rpc GetUserList (GetUserListRequest) returns (GetUserListResponse);
  rpc UpdateUser (UpdateUserRequest) returns (UserInfo);
  rpc AddIdentity (AddIdentityRequest) returns (AddIdentityResponse);
  rpc RemoveIdentity (RemoveIdentityRequest) returns (RemoveIdentityResponse);
}

message SendEmailCodeRequest {
  string email = 1;
}

message SendEmailCodeResponse {
  bool success = 1;
}

message RegisterEmailRequest {
  string email = 1;
  string password = 2;
  string nickname = 3;
  string code = 4;
}

message RegisterResponse {
  int64 user_id = 1;
}

message LoginEmailRequest {
  string email = 1;
  string password = 2;
}

message LoginEmailCodeRequest {
  string email = 1;
  string code = 2;
  optional string nickname = 3;
}

message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  int64 expires_in = 3;
  UserInfo user = 4;
}

message ResetPasswordRequest {
  string email = 1;
  string code = 2;
  string new_password = 3;
}

message ResetPasswordResponse {
  bool success = 1;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message RefreshTokenResponse {
  string access_token = 1;
  int64 expires_in = 2;
}

message UserInfo {
  int64 user_id = 1;
  string email = 2;
  string nickname = 3;
  string avatar_url = 4;
  repeated string identities = 5;
  int64 created_at = 6;
}

message GetUserRequest {
  int64 user_id = 1;
}

message GetUserListRequest {
  int32 page = 1;
  int32 page_size = 2;
  optional string email_keyword = 3;
  optional string status = 4;
}

message GetUserListResponse {
  repeated UserInfo users = 1;
  int64 total = 2;
}

message UpdateUserRequest {
  int64 user_id = 1;
  optional string nickname = 2;
  optional string avatar_url = 3;
}

message AddIdentityRequest {
  int64 user_id = 1;
  string identity_name = 2;
}

message AddIdentityResponse {
  bool success = 1;
}

message RemoveIdentityRequest {
  int64 user_id = 1;
  string identity_name = 2;
}

message RemoveIdentityResponse {
  bool success = 1;
}
