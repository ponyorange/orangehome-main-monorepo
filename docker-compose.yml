# 单容器跑全栈（supervisord）：admin:60061；platform+builder 共用 60062（/platform/、/builder/）
# 国内拉基础镜像失败时：export BASE_IMAGE=docker.m.daocloud.io/library/node:22-bookworm-slim
# 使用：docker compose up --build   或   docker compose up（已有镜像时）

services:
  orangehome:
    build:
      context: .
      dockerfile: docker/Dockerfile.all
      args:
        BASE_IMAGE: ${BASE_IMAGE:-node:22-bookworm-slim}
    image: orangehome-monorepo:latest
    container_name: orangehome-monorepo
    restart: unless-stopped
    ports:
      - "50054:50054" # server_bside
      - "50055:50055" # server_cside
      - "60061:60061" # web_admin
      - "60062:60062" # web_platform /platform/ + web_builder /builder/
    env_file:
      - .env.server  # 后端共用环境变量
      - .env.web  # web_admin 环境变量
